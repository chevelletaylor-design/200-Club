backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

publish_mode: editorial_workflow

collections:
  - name: "content"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "🛡️  Edit Site Content"
        file: "config.json"
        fields:

          # ===== BRAND (global) =====
          - label: "🏷️  Brand & Logo (appears on every page)"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Logo image", name: "logo", widget: "image", required: false, hint: "Upload the 200 Club crest here. Leave empty to use the built-in default." }
              - { label: "Logo alt text", name: "logoAlt", widget: "string" }
              - { label: "Organization name (header)", name: "name", widget: "string" }
              - { label: "Tagline (under name)", name: "tagline", widget: "string" }
              - { label: "Motto (e.g. 'We Remember')", name: "motto", widget: "string", required: false }

          # ===== NAV (global) =====
          - label: "🧭  Navigation Menu (global)"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - label: "Menu links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link (page.html or full URL)", name: "href", widget: "string" }
              - { label: "Donate button label", name: "ctaLabel", widget: "string" }
              - { label: "Donate button link", name: "ctaHref", widget: "string" }

          # ===== SOCIAL (global) =====
          - label: "🌐  Social Media Links (footer)"
            name: "social"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Twitter/X URL", name: "twitter", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }

          # ===== HOME PAGE =====
          - label: "🏠  HOME PAGE"
            name: "home"
            widget: "object"
            collapsed: true
            fields:
              - label: "Hero Slideshow"
                name: "hero"
                widget: "object"
                fields:
                  - label: "Slides (auto-rotate every 6.5s)"
                    name: "slides"
                    widget: "list"
                    fields:
                      - { label: "Eyebrow (small text above headline)", name: "eyebrow", widget: "string" }
                      - { label: "Headline (wrap one word in <em>...</em> for gold accent)", name: "headline", widget: "string" }
                      - { label: "Subheadline", name: "subheadline", widget: "text" }
                      - { label: "Primary button label", name: "primaryCtaLabel", widget: "string", required: false }
                      - { label: "Primary button link", name: "primaryCtaHref", widget: "string", required: false }
                      - { label: "Secondary button label", name: "secondaryCtaLabel", widget: "string", required: false }
                      - { label: "Secondary button link", name: "secondaryCtaHref", widget: "string", required: false }
                      - { label: "Background image (landscape)", name: "bgImage", widget: "image", required: false }
                      - { label: "Image alt text", name: "imageAlt", widget: "string", required: false }

              - label: "Mission Bar (italic quote between hero and mission)"
                name: "missionBar"
                widget: "object"
                fields:
                  - { label: "Quote text (wrap words in <em>...</em> for gold accent)", name: "text", widget: "text" }

              - label: "Three Pillars Section"
                name: "pillars"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Paragraphs"
                    name: "paragraphs"
                    widget: "list"
                    field: { label: "Paragraph", name: "text", widget: "text" }
                  - label: "Pillar cards (3)"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Number (01, 02, 03)", name: "number", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
                      - { label: "Link label", name: "linkLabel", widget: "string", required: false }
                      - { label: "Link URL", name: "linkHref", widget: "string", required: false }

              - label: "Featured Story (portrait photo + quote)"
                name: "featuredStory"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title (short quote)", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Attribution (name)", name: "attribution", widget: "string" }
                  - { label: "Attribution detail", name: "attributionDetail", widget: "string" }
                  - { label: "Portrait photo (4:5 ratio)", name: "image", widget: "image", required: false, hint: "THIS is the one portrait photo on the site — use a 4:5 portrait orientation." }
                  - { label: "Photo alt text", name: "imageAlt", widget: "string" }
                  - { label: "Read-more button label", name: "ctaLabel", widget: "string" }
                  - { label: "Read-more button link", name: "ctaHref", widget: "string" }

              - label: "President's Message (portrait photo)"
                name: "presidentMessage"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Quote (the president's message)", name: "quote", widget: "text" }
                  - { label: "Attribution (name)", name: "attribution", widget: "string" }
                  - { label: "Attribution detail (title)", name: "attributionDetail", widget: "string" }
                  - { label: "Portrait photo (4:5 ratio)", name: "image", widget: "image", required: false, hint: "Portrait orientation — headshot of the president." }
                  - { label: "Photo alt text", name: "imageAlt", widget: "string" }
                  - { label: "CTA button label", name: "ctaLabel", widget: "string" }
                  - { label: "CTA button link", name: "ctaHref", widget: "string" }

          # ===== ABOUT PAGE =====
          - label: "👥  ABOUT PAGE"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - label: "Page Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subheadline", name: "subheadline", widget: "text" }

              - label: "Our Story"
                name: "story"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Paragraphs (HTML allowed)"
                    name: "paragraphs"
                    widget: "list"
                    field: { label: "Paragraph", name: "text", widget: "text" }

              - label: "Our Leadership (3 group photos)"
                name: "gallery"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Section title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Photos (landscape, 3:2 ratio)"
                    name: "photos"
                    widget: "list"
                    hint: "Recommended: 3 landscape group photos — board portrait, officers, or ceremony shots."
                    fields:
                      - { label: "Photo (landscape 3:2)", name: "src", widget: "image" }
                      - { label: "Alt text (for accessibility)", name: "alt", widget: "string" }
                      - { label: "Caption (shown under photo)", name: "caption", widget: "string" }

              - label: "Board & Trustees"
                name: "board"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Section title", name: "title", widget: "string" }
                  - label: "Executive Officers"
                    name: "officers"
                    widget: "object"
                    fields:
                      - { label: "Heading", name: "heading", widget: "string" }
                      - label: "Members"
                        name: "members"
                        widget: "list"
                        fields:
                          - { label: "Name", name: "name", widget: "string" }
                          - { label: "Title", name: "title", widget: "string" }
                  - label: "Board of Trustees"
                    name: "trustees"
                    widget: "object"
                    fields:
                      - { label: "Heading", name: "heading", widget: "string" }
                      - label: "Members"
                        name: "members"
                        widget: "list"
                        field: { label: "Name", name: "name", widget: "string" }
                  - label: "Trustees Emeritus"
                    name: "emeritus"
                    widget: "object"
                    fields:
                      - { label: "Heading", name: "heading", widget: "string" }
                      - label: "Members"
                        name: "members"
                        widget: "list"
                        field: { label: "Name", name: "name", widget: "string" }
                  - label: "Advisory Committee"
                    name: "advisory"
                    widget: "object"
                    fields:
                      - { label: "Heading", name: "heading", widget: "string" }
                      - label: "Members"
                        name: "members"
                        widget: "list"
                        field: { label: "Name", name: "name", widget: "string" }
                  - label: "Trustees Ex Officio"
                    name: "exOfficio"
                    widget: "object"
                    fields:
                      - { label: "Heading", name: "heading", widget: "string" }
                      - label: "Members (titles only, no names)"
                        name: "members"
                        widget: "list"
                        field: { label: "Role", name: "name", widget: "string" }

              - label: "President's Message (same block as Home page)"
                name: "presidentMessage"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Quote", name: "quote", widget: "text" }
                  - { label: "Attribution (name)", name: "attribution", widget: "string" }
                  - { label: "Attribution detail (title)", name: "attributionDetail", widget: "string" }
                  - { label: "Portrait photo", name: "image", widget: "image", required: false }
                  - { label: "Photo alt text", name: "imageAlt", widget: "string" }
                  - { label: "CTA button label", name: "ctaLabel", widget: "string" }
                  - { label: "CTA button link", name: "ctaHref", widget: "string" }

          # ===== PROGRAMS PAGE =====
          - label: "🎓  PROGRAMS PAGE (Scholarships, Valor, Spotlight 200)"
            name: "programs"
            widget: "object"
            collapsed: true
            fields:
              - label: "Page Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subheadline", name: "subheadline", widget: "text" }

              - label: "Scholarships Section"
                name: "scholarships"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Paragraphs"
                    name: "paragraphs"
                    widget: "list"
                    field: { label: "Paragraph", name: "text", widget: "text" }
                  - label: "Big stat box"
                    name: "stat"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Big number", name: "number", widget: "string" }
                      - { label: "Description", name: "label", widget: "string" }
                  - label: "Scholarship types"
                    name: "awards"
                    widget: "list"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
                  - label: "Action buttons"
                    name: "buttons"
                    widget: "list"
                    fields:
                      - { label: "Button label", name: "label", widget: "string" }
                      - { label: "Link (JotForm URL)", name: "href", widget: "string" }
                      - { label: "Style", name: "style", widget: "select", options: ["solid", "outline"], default: "solid" }
                  - label: "Photo carousel"
                    name: "photos"
                    widget: "list"
                    fields:
                      - { label: "Photo (landscape)", name: "src", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }

              - label: "Valor Awards Section (NO emojis)"
                name: "valor"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Paragraphs"
                    name: "paragraphs"
                    widget: "list"
                    field: { label: "Paragraph", name: "text", widget: "text" }
                  - label: "Award types"
                    name: "awards"
                    widget: "list"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
                  - { label: "Nomination button label", name: "ctaLabel", widget: "string", required: false }
                  - { label: "Nomination form URL", name: "ctaHref", widget: "string", required: false }
                  - label: "Photo carousel"
                    name: "photos"
                    widget: "list"
                    fields:
                      - { label: "Photo (landscape)", name: "src", widget: "image" }
                      - { label: "Alt text", name: "alt", widget: "string", required: false }

              - label: "Spotlight 200 Stories"
                name: "spotlights"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Section title", name: "title", widget: "string" }
                  - { label: "Section description", name: "description", widget: "text" }
                  - label: "Stories"
                    name: "stories"
                    widget: "list"
                    fields:
                      - { label: "URL slug (used for anchor links, e.g. 'russo')", name: "slug", widget: "string" }
                      - { label: "Badge (e.g. 'Valor Award · Neptune Township PD')", name: "badge", widget: "string" }
                      - { label: "Title (person's name)", name: "title", widget: "string" }
                      - { label: "Subtitle (short quote or summary)", name: "subtitle", widget: "string" }
                      - { label: "Photo (landscape preferred)", name: "image", widget: "image", required: false }
                      - { label: "Photo alt text", name: "imageAlt", widget: "string", required: false }
                      - label: "Story paragraphs"
                        name: "paragraphs"
                        widget: "list"
                        field: { label: "Paragraph", name: "text", widget: "text" }

          # ===== MEDIA PAGE =====
          - label: "📰  MEDIA PAGE (Events, Press, Galleries, Videos)"
            name: "media"
            widget: "object"
            collapsed: true
            fields:
              - label: "Page Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subheadline", name: "subheadline", widget: "text" }

              - label: "Events Section"
                name: "events"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Events list"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Month (3 letters, e.g. Jun)", name: "month", widget: "string" }
                      - { label: "Day (e.g. 05)", name: "day", widget: "string" }
                      - { label: "Year", name: "year", widget: "string" }
                      - { label: "Event title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
                      - { label: "Ticket button label", name: "ctaLabel", widget: "string" }
                      - { label: "Ticket link", name: "ctaHref", widget: "string" }

              - label: "Press & Media"
                name: "press"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
                  - label: "Press categories (Recent, In The News, Radio, etc.)"
                    name: "categories"
                    widget: "list"
                    fields:
                      - { label: "Category heading", name: "heading", widget: "string" }
                      - label: "Press items"
                        name: "items"
                        widget: "list"
                        fields:
                          - { label: "Article title", name: "title", widget: "string" }
                          - { label: "Outlet / publication", name: "outlet", widget: "string" }
                          - { label: "Date (optional)", name: "date", widget: "string", required: false }
                          - { label: "Article URL (paste real link here)", name: "url", widget: "string", hint: "Leave as # if no link yet." }

              - label: "Photo Galleries (links out to SmugMug)"
                name: "galleries"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Main SmugMug URL (top-level link)", name: "sourceUrl", widget: "string", required: false }
                  - { label: "Main SmugMug link label", name: "sourceLabel", widget: "string", required: false }
                  - label: "Gallery collections"
                    name: "collections"
                    widget: "list"
                    fields:
                      - { label: "Gallery title (e.g. '2024 Valor Awards Luncheon')", name: "title", widget: "string" }
                      - { label: "Year (for grouping)", name: "year", widget: "string" }
                      - { label: "SmugMug URL for this gallery", name: "url", widget: "string" }
                      - { label: "Cover image (landscape thumbnail)", name: "coverImage", widget: "image", required: false }

              - label: "Video Gallery (YouTube)"
                name: "videos"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Videos"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Video title", name: "title", widget: "string" }
                      - { label: "YouTube video ID (the part after youtu.be/)", name: "videoId", widget: "string", hint: "From https://youtu.be/ABC123, the ID is ABC123" }
                      - { label: "Full YouTube URL", name: "url", widget: "string" }

          # ===== JOIN PAGE =====
          - label: "🤝  JOIN PAGE (Membership, Donate, Contact)"
            name: "join"
            widget: "object"
            collapsed: true
            fields:
              - label: "Page Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subheadline", name: "subheadline", widget: "text" }

              - label: "Intro text above membership/donate cards"
                name: "intro"
                widget: "object"
                fields:
                  - { label: "Description", name: "description", widget: "text" }

              - label: "Membership Card"
                name: "membership"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Benefits heading", name: "benefitsHeading", widget: "string" }
                  - label: "Benefits list"
                    name: "benefits"
                    widget: "list"
                    field: { label: "Benefit", name: "benefit", widget: "string" }
                  - { label: "Fine print", name: "fine", widget: "string", required: false }
                  - { label: "Button label", name: "ctaLabel", widget: "string" }
                  - { label: "Button link (new form URL OR mailto)", name: "ctaHref", widget: "string", hint: "Replace with new membership form URL once created." }

              - label: "Donation Card"
                name: "donate"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Benefits heading", name: "benefitsHeading", widget: "string" }
                  - label: "Benefits list"
                    name: "benefits"
                    widget: "list"
                    field: { label: "Benefit", name: "benefit", widget: "string" }
                  - { label: "PayPal QR code image", name: "qrImage", widget: "image", required: false }
                  - { label: "QR code note", name: "qrNote", widget: "string", required: false }
                  - { label: "Fine print", name: "fine", widget: "string", required: false }
                  - { label: "Button label", name: "ctaLabel", widget: "string" }
                  - { label: "Button link (PayPal URL)", name: "ctaHref", widget: "string" }

              - label: "Contact Section"
                name: "contact"
                widget: "object"
                fields:
                  - { label: "Eyebrow", name: "eyebrow", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Email address", name: "email", widget: "string" }
                  - { label: "Email note", name: "emailNote", widget: "string" }
                  - { label: "Phone (display)", name: "phone", widget: "string" }
                  - { label: "Phone (tel: link, digits only)", name: "phoneHref", widget: "string" }
                  - { label: "Phone note", name: "phoneNote", widget: "string" }
                  - { label: "Mailing address (line breaks OK)", name: "address", widget: "text" }
                  - { label: "Donation card note", name: "donationNote", widget: "string" }
                  - { label: "Submit button label", name: "submitLabel", widget: "string" }
                  - { label: "Form provider", name: "formProvider", widget: "select", options: ["demo", "formspree"], default: "demo" }
                  - { label: "Formspree URL", name: "formAction", widget: "string", required: false }

          # ===== FOOTER (global) =====
          - label: "📎  Footer (global, appears on every page)"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Brand name", name: "brandName", widget: "string" }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - label: "Footer link columns"
                name: "columns"
                widget: "list"
                fields:
                  - { label: "Column heading", name: "heading", widget: "string" }
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "href", widget: "string" }
              - { label: "Copyright line", name: "copyright", widget: "string" }
              - label: "Designer credit"
                name: "designerCredit"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "href", widget: "string" }
