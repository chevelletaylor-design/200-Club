<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events, Press & Galleries | The 200 Club of Monmouth County</title>
<meta name="description" content="Upcoming events, press coverage, and photo galleries from our Valor Awards, scholarship socials, and golf outings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
:root{
  --navy:#1c3d6f;        /* deep navy from logo */
  --navy-d:#132a4f;      /* darker navy */
  --navy-x:#0a1830;      /* nearly-black navy */
  --blue:#4a7ab8;        /* mid blue */
  --blue-l:#a8c5e8;      /* light blue from logo */
  --blue-lx:#dce8f7;     /* very light blue */
  --blue-bg:#f0f5fc;     /* page section soft-blue bg */
  --gold:#c9a14a;        /* gold accent (sparingly) */
  --gold-d:#a6822f;
  --w:#fff;
  --off:#f8f9fb;
  --t:#111827;           /* body text */
  --m:#4b5563;           /* secondary text */
  --lt:#8899aa;
  --br:#e2e8f0;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;font-size:17px;color:var(--t);background:var(--w);-webkit-font-smoothing:antialiased;line-height:1.65;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
img{max-width:100%;display:block;}
a{color:var(--navy);}

/* === NAV === */
nav{background:#fff;border-bottom:1px solid var(--br);position:sticky;top:0;z-index:1000;}
.ni{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:80px;gap:24px;}
.logo{display:flex;align-items:center;gap:14px;cursor:pointer;text-decoration:none;flex-shrink:0;}
.logo img{height:56px;width:auto;}
.logo svg{height:56px;width:56px;}
.logo-t{font-size:15px;font-weight:700;color:var(--navy);line-height:1.25;letter-spacing:-.2px;}
.logo-t small{display:block;font-size:10px;font-weight:500;color:var(--lt);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px;}
.nl{display:flex;align-items:center;gap:2px;list-style:none;}
.nl a{color:var(--m);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:6px;transition:color .15s,background .15s;cursor:pointer;white-space:nowrap;}
.nl a:hover,.nl a.active{color:var(--navy);background:var(--blue-bg);}
.nl a.active{font-weight:700;}
.ncta{background:var(--gold)!important;color:var(--navy-x)!important;border-radius:6px!important;padding:10px 20px!important;font-weight:700!important;letter-spacing:.3px;}
.ncta:hover{background:var(--gold-d)!important;color:#fff!important;}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:none;}
.ham span{width:22px;height:2px;background:var(--t);border-radius:2px;}
.mob{display:none;position:fixed;inset:80px 0 0;background:#fff;z-index:999;padding:24px 32px;border-top:1px solid var(--br);overflow-y:auto;}
.mob.open{display:block;}
.mob a{display:block;font-size:17px;font-weight:500;color:var(--t);padding:14px 0;border-bottom:1px solid var(--br);cursor:pointer;text-decoration:none;}
.mob .mc{background:var(--gold);color:var(--navy-x)!important;border-radius:8px;padding:14px 20px!important;text-align:center;margin-top:16px;border-bottom:none!important;font-weight:700;}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;border:none;text-decoration:none;line-height:1.2;}
.bb{background:var(--navy);color:#fff;}
.bb:hover{background:var(--navy-d);transform:translateY(-1px);box-shadow:0 6px 20px rgba(28,61,111,.3);}
.bg{background:var(--gold);color:var(--navy-x);}
.bg:hover{background:var(--gold-d);color:#fff;transform:translateY(-1px);}
.bw{background:#fff;color:var(--navy);}
.bw:hover{background:var(--blue-bg);}
.bob{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.4);}
.bob:hover{border-color:#fff;background:rgba(255,255,255,.08);}
.bou{background:transparent;color:var(--navy);border:2px solid var(--navy);}
.bou:hover{background:var(--navy);color:#fff;}

/* === PAGE HERO (non-home) === */
.ph{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-d) 60%,var(--navy-x) 100%);color:#fff;padding:120px 32px 96px;position:relative;overflow:hidden;}
.ph::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(168,197,232,.15) 0%,transparent 70%);pointer-events:none;}
.ph-in{max-width:1200px;margin:0 auto;position:relative;z-index:2;}
.ph-ey{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 16px;border-radius:30px;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;font-weight:600;}
.ph h1{font-family:'DM Serif Display',serif;font-size:clamp(34px,5vw,56px);line-height:1.1;font-weight:400;letter-spacing:-1px;margin-bottom:18px;max-width:900px;}
.ph h1 em{font-style:italic;color:var(--blue-l);font-weight:400;}
.ph p{font-size:clamp(16px,1.4vw,19px);color:rgba(255,255,255,.88);max-width:680px;line-height:1.55;}

/* === HOMEPAGE HERO SLIDESHOW === */
.hero{position:relative;height:86vh;min-height:560px;max-height:820px;overflow:hidden;background:var(--navy-x);}
.hs{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;}
.hs.on{opacity:1;}
.hs-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:1;}
.hs-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,24,48,.45) 0%,rgba(10,24,48,.62) 55%,rgba(10,24,48,.92) 100%);}
.hs-ph-full{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,var(--navy-x) 0%,var(--navy) 50%,var(--blue) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.4);gap:10px;padding:48px;text-align:center;}
.hs-ph-full .ic{font-size:56px;opacity:.5;}
.hs-ph-full .fn{font-family:monospace;font-size:13px;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:4px;color:rgba(255,255,255,.7);}
.hs-ph-full .fb{font-size:12px;font-style:italic;max-width:320px;color:rgba(255,255,255,.5);}
.hs-in{position:relative;z-index:3;max-width:1080px;margin:0 auto;padding:0 32px 120px;height:100%;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;}
.hs-ey{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;padding:7px 16px;border-radius:30px;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;font-weight:600;align-self:flex-start;}
.hs h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,6vw,72px);line-height:1.05;font-weight:400;letter-spacing:-1.5px;margin-bottom:22px;max-width:900px;}
.hs h1 em{font-style:italic;color:var(--gold);font-weight:400;}
.hs p{font-size:clamp(16px,1.6vw,20px);line-height:1.5;margin-bottom:32px;max-width:640px;color:rgba(255,255,255,.94);}
.hs-ctas{display:flex;gap:14px;flex-wrap:wrap;}
.hs-ctl{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;}
.hs-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;transition:all .2s;padding:0;}
.hs-dot.on{background:#fff;width:28px;border-radius:5px;}

/* === MISSION BAR === */
.mb{background:var(--navy-x);color:#fff;padding:40px 32px;text-align:center;}
.mb p{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(18px,2.2vw,24px);max-width:900px;margin:0 auto;line-height:1.5;color:rgba(255,255,255,.95);}
.mb p em{color:var(--gold);}

/* === SECTION BASE === */
.s{padding:90px 32px;max-width:1200px;margin:0 auto;}
.s-narrow{max-width:960px;}
.s-dk{background:var(--navy-x);color:#fff;padding:90px 32px;}
.s-dk-in{max-width:1200px;margin:0 auto;}
.s-bl{background:var(--blue-bg);}
.s-nv{background:var(--navy);color:#fff;}
.ey{display:inline-block;background:var(--blue-bg);color:var(--navy);padding:6px 14px;border-radius:30px;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:18px;}
.s-dk .ey,.s-nv .ey{background:rgba(255,255,255,.12);color:var(--blue-l);}
h2.d{font-family:'DM Serif Display',serif;font-size:clamp(30px,4vw,44px);line-height:1.15;font-weight:400;letter-spacing:-.5px;margin-bottom:24px;}
.rule{width:48px;height:3px;background:var(--gold);margin-bottom:28px;}
.prose p{margin-bottom:16px;color:var(--m);font-size:17px;}
.s-dk .prose p,.s-nv .prose p{color:rgba(255,255,255,.9);}

/* === PILLARS === */
.pl{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;}
.card{background:#fff;border:1px solid var(--br);border-radius:14px;padding:32px;transition:all .3s;}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(28,61,111,.1);border-color:var(--blue);}
.cnum{font-family:'DM Serif Display',serif;font-style:italic;color:var(--gold);font-size:32px;margin-bottom:12px;}
.card h3{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:14px;color:var(--navy-x);font-weight:400;}
.card p{color:var(--m);font-size:15px;margin-bottom:20px;line-height:1.6;}
.cl{color:var(--navy);text-decoration:none;font-weight:600;font-size:14px;border-bottom:1px solid transparent;transition:border-color .2s;cursor:pointer;}
.cl:hover{border-bottom-color:var(--navy);}

/* === FEATURED STORY (portrait photo + quote) === */
.fs{margin-top:64px;background:linear-gradient(135deg,var(--navy-x) 0%,var(--navy) 100%);color:#fff;border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1fr 1.2fr;gap:0;align-items:stretch;position:relative;}
.fs-img{aspect-ratio:4/5;background:var(--navy-d);overflow:hidden;}
.fs-img img{width:100%;height:100%;object-fit:cover;}
.fs-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.5);gap:10px;padding:32px;text-align:center;background:linear-gradient(135deg,var(--navy-d),var(--navy-x));}
.fs-img-ph .ic{font-size:48px;opacity:.5;}
.fs-img-ph .fn{font-family:monospace;font-size:12px;background:rgba(255,255,255,.08);padding:4px 10px;border-radius:4px;}
.fs-img-ph .fb{font-size:11px;font-style:italic;max-width:240px;}
.fs-tx{padding:56px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;}
.fs-tx::before{content:'\201C';position:absolute;top:20px;right:40px;font-family:'DM Serif Display',serif;font-size:160px;color:rgba(201,161,74,.15);line-height:1;pointer-events:none;}
.fs-ey{display:inline-block;color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:16px;}
.fs-tx h3{font-family:'DM Serif Display',serif;font-size:clamp(22px,2.6vw,32px);line-height:1.25;font-weight:400;margin-bottom:18px;font-style:italic;position:relative;z-index:2;}
.fs-tx p{color:rgba(255,255,255,.88);font-size:16px;margin-bottom:22px;line-height:1.6;position:relative;z-index:2;}
.fs-att{padding-top:18px;border-top:1px solid rgba(255,255,255,.2);margin-bottom:22px;position:relative;z-index:2;}
.fs-att strong{color:var(--gold);font-size:14px;display:block;}
.fs-att span{color:rgba(255,255,255,.7);font-size:12px;margin-top:2px;display:block;}

/* === PRESIDENT'S MESSAGE === */
.pm{background:var(--blue-bg);padding:90px 32px;}
.pm-in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.4fr;gap:56px;align-items:center;}
.pm-img{aspect-ratio:4/5;border-radius:14px;overflow:hidden;background:var(--blue-lx);box-shadow:0 12px 40px rgba(28,61,111,.15);}
.pm-img img{width:100%;height:100%;object-fit:cover;}
.pm-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--blue);gap:8px;padding:24px;text-align:center;}
.pm-img-ph .ic{font-size:48px;opacity:.4;}
.pm-img-ph .fn{font-family:monospace;font-size:11px;background:var(--blue-lx);color:var(--navy);padding:3px 8px;border-radius:4px;}
.pm-tx blockquote{font-family:'DM Serif Display',serif;font-size:clamp(20px,2.2vw,26px);line-height:1.5;color:var(--navy-x);font-weight:400;font-style:italic;margin-bottom:24px;position:relative;padding-left:16px;border-left:3px solid var(--gold);}
.pm-att{display:flex;flex-direction:column;padding:16px 0;margin-bottom:24px;}
.pm-att strong{font-family:'DM Serif Display',serif;font-size:18px;color:var(--navy);font-weight:400;}
.pm-att span{color:var(--m);font-size:14px;margin-top:2px;}

/* === 2-COL SECTION === */
.tc{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;}
.tc.rev .tc-l{order:2;}
.sb2{background:var(--navy);color:#fff;padding:28px 32px;border-radius:12px;margin:28px 0;text-align:center;}
.sb2 .big{font-family:'DM Serif Display',serif;font-size:42px;display:block;margin-bottom:6px;color:var(--gold);}
.sb2 p{color:rgba(255,255,255,.9);font-size:14px;line-height:1.5;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;}

/* === LANDSCAPE PHOTO CAROUSEL === */
.ps{position:relative;aspect-ratio:3/2;border-radius:16px;overflow:hidden;background:var(--blue-lx);box-shadow:0 12px 40px rgba(28,61,111,.1);}
.ps-img{position:absolute;inset:0;opacity:0;transition:opacity .6s;}
.ps-img.on{opacity:1;}
.ps-img img{width:100%;height:100%;object-fit:cover;}
.ps-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--blue);background:var(--blue-lx);gap:8px;}
.ps-ph .ic{font-size:44px;margin-bottom:4px;opacity:.5;}
.ps-ph .fn{font-family:monospace;font-size:11px;background:#fff;color:var(--navy);padding:3px 8px;border-radius:4px;}
.ps-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2;}
.ps-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.7);border:none;cursor:pointer;padding:0;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.ps-dot.on{background:#fff;width:20px;border-radius:4px;}

/* === AWARD LIST === */
.al{display:flex;flex-direction:column;gap:14px;margin-top:20px;}
.ai{display:flex;gap:18px;align-items:flex-start;padding:20px;background:#fff;border-radius:10px;border-left:3px solid var(--gold);box-shadow:0 2px 10px rgba(28,61,111,.04);}
.s-bl .ai{background:#fff;}
.ai-num{font-family:'DM Serif Display',serif;color:var(--gold);font-size:22px;line-height:1;flex-shrink:0;font-style:italic;min-width:32px;}
.ain h4{font-family:'DM Serif Display',serif;font-size:19px;color:var(--navy-x);margin-bottom:6px;font-weight:400;}
.ain p{color:var(--m);font-size:14px;line-height:1.55;}

/* === EVENTS === */
.ev{display:flex;flex-direction:column;gap:18px;margin-top:32px;}
.ev-i{background:#fff;border:1px solid var(--br);border-radius:12px;padding:28px 32px;display:grid;grid-template-columns:100px 1fr auto;gap:24px;align-items:center;transition:all .2s;}
.ev-i:hover{border-color:var(--navy);box-shadow:0 8px 30px rgba(28,61,111,.08);}
.ed{text-align:center;}
.ed .mo{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--navy);font-weight:700;}
.ed .dy{font-family:'DM Serif Display',serif;font-size:42px;color:var(--navy-x);line-height:1;margin-top:4px;}
.ed .yr{font-size:12px;color:var(--lt);margin-top:4px;}
.eb h3{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy-x);margin-bottom:6px;font-weight:400;}
.eb p{color:var(--m);font-size:14px;line-height:1.55;}

/* === SPOTLIGHT STORIES === */
.ss{margin-top:48px;display:flex;flex-direction:column;gap:56px;}
.ss-i{background:#fff;border:1px solid var(--br);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(28,61,111,.04);}
.ss-hd{display:grid;grid-template-columns:1.2fr 1fr;gap:0;}
.ss-img{aspect-ratio:3/2;overflow:hidden;background:var(--blue-lx);}
.ss-img img{width:100%;height:100%;object-fit:cover;}
.ss-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--blue);gap:6px;padding:20px;text-align:center;}
.ss-img-ph .ic{font-size:38px;opacity:.4;}
.ss-img-ph .fn{font-family:monospace;font-size:11px;background:#fff;color:var(--navy);padding:3px 8px;border-radius:4px;}
.ss-hx{padding:40px 44px;display:flex;flex-direction:column;justify-content:center;}
.ss-bd{display:inline-block;background:var(--navy);color:#fff;padding:5px 14px;border-radius:20px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:14px;align-self:flex-start;}
.ss-hx h3{font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy-x);margin-bottom:8px;font-weight:400;}
.ss-sub{color:var(--gold-d);font-style:italic;font-size:16px;font-family:'DM Serif Display',serif;}
.ss-bd-tx{padding:32px 44px 44px;border-top:1px solid var(--br);}
.ss-bd-tx p{color:var(--m);font-size:16px;margin-bottom:16px;line-height:1.75;}
.ss-bd-tx p:last-child{margin-bottom:0;}

/* === GALLERIES === */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
.gal-c{background:#fff;border:1px solid var(--br);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:all .25s;display:block;}
.gal-c:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(28,61,111,.1);border-color:var(--blue);}
.gal-c-img{aspect-ratio:3/2;overflow:hidden;background:var(--blue-lx);position:relative;}
.gal-c-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.gal-c:hover .gal-c-img img{transform:scale(1.05);}
.gal-c-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--blue);gap:4px;}
.gal-c-ph .ic{font-size:30px;opacity:.5;}
.gal-c-ph .fn{font-family:monospace;font-size:10px;background:#fff;color:var(--navy);padding:2px 8px;border-radius:3px;}
.gal-c-hd{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.gal-c-t{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy-x);font-weight:400;line-height:1.3;}
.gal-c-yr{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);font-weight:700;flex-shrink:0;}

/* === VIDEOS === */
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px;}
.vid-c{background:#fff;border:1px solid var(--br);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:all .25s;display:block;position:relative;}
.vid-c:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(28,61,111,.12);}
.vid-c-img{aspect-ratio:16/9;overflow:hidden;background:var(--navy-x);position:relative;}
.vid-c-img img{width:100%;height:100%;object-fit:cover;}
.vid-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.vid-play::after{content:'';width:0;height:0;border-left:18px solid var(--navy);border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:4px;}
.vid-c:hover .vid-play{background:#fff;transform:translate(-50%,-50%) scale(1.08);}
.vid-c-hd{padding:14px 18px;}
.vid-c-t{font-family:'DM Serif Display',serif;font-size:15px;color:var(--navy-x);font-weight:400;line-height:1.3;}

/* === PRESS === */
.pr-cat{margin-top:40px;}
.pr-cat h3{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy-x);margin-bottom:18px;font-weight:400;padding-bottom:10px;border-bottom:2px solid var(--gold);display:inline-block;}
.pr-list{display:flex;flex-direction:column;gap:10px;}
.pr-i{background:#fff;border:1px solid var(--br);border-radius:10px;padding:18px 22px;text-decoration:none;color:inherit;transition:all .2s;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;}
.pr-i:hover{border-color:var(--navy);box-shadow:0 4px 16px rgba(28,61,111,.06);}
.pr-tx .pt{font-size:15px;font-weight:600;line-height:1.4;color:var(--navy-x);margin-bottom:4px;}
.pr-tx .pm{font-size:12px;color:var(--m);}
.pr-tx .pm .po{font-weight:600;color:var(--navy);}
.pr-arr{color:var(--lt);font-size:18px;transition:color .2s,transform .2s;flex-shrink:0;}
.pr-i:hover .pr-arr{color:var(--navy);transform:translateX(3px);}

/* === BOARD === */
.bd-grp{margin-top:48px;}
.bd-grp h3{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy-x);font-weight:400;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--gold);display:inline-block;}
.bd-l{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.bd-i{background:#fff;border:1px solid var(--br);border-radius:10px;padding:18px 22px;border-left:3px solid var(--blue-l);}
.bd-i strong{display:block;font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy-x);font-weight:400;}
.bd-i span{font-size:12px;color:var(--gold-d);letter-spacing:.5px;font-weight:600;text-transform:uppercase;margin-top:3px;display:block;}

/* === MEMBER/DONATE CARDS === */
.iv{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:48px;}
.iv-c{background:#fff;border:1px solid var(--br);border-radius:16px;padding:40px;transition:all .3s;display:flex;flex-direction:column;}
.iv-c:hover{border-color:var(--navy);box-shadow:0 10px 30px rgba(28,61,111,.08);}
.ivh h3{font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy-x);margin-bottom:10px;font-weight:400;}
.ivh p{color:var(--m);font-size:15px;margin-bottom:24px;line-height:1.6;}
.ivc{background:var(--blue-bg);border-radius:10px;padding:24px;margin-bottom:24px;flex:1;}
.ivc h4{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);margin-bottom:14px;font-weight:700;}
.ivc ul{list-style:none;padding:0;margin:0;}
.ivc li{padding:8px 0 8px 24px;position:relative;color:var(--m);font-size:14px;line-height:1.5;}
.ivc li::before{content:'\2713';position:absolute;left:0;color:var(--navy);font-weight:700;}
.fine{font-size:12px;color:var(--lt);margin-bottom:18px;font-style:italic;}
.qr-wrap{display:flex;gap:18px;align-items:center;padding:18px;background:var(--blue-bg);border-radius:10px;margin-bottom:24px;}
.qr-img{width:110px;height:110px;background:#fff;border-radius:8px;padding:8px;border:1px solid var(--br);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.qr-img img{max-width:100%;max-height:100%;}
.qr-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--lt);font-size:10px;text-align:center;}
.qr-tx p{font-size:13px;color:var(--m);line-height:1.5;margin:0;}
.qr-tx strong{color:var(--navy-x);display:block;margin-bottom:4px;font-size:14px;}

/* === CONTACT === */
.cx{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;margin-top:48px;}
.cd{display:flex;gap:14px;align-items:flex-start;padding:18px;background:#fff;border:1px solid var(--br);border-radius:10px;margin-bottom:14px;}
.co{font-size:22px;flex-shrink:0;}
.cd strong{display:block;font-size:14px;color:var(--navy-x);margin-bottom:4px;}
.cd p{color:var(--m);font-size:14px;line-height:1.5;}
.cd a{color:var(--navy);text-decoration:none;font-weight:600;font-size:14px;}
.cd a:hover{text-decoration:underline;}
.cf{background:#fff;border:1px solid var(--br);border-radius:14px;padding:36px;}
.fr{display:grid;gap:18px;}
.fg label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg textarea,.fg select{width:100%;padding:12px 16px;border:1px solid var(--br);border-radius:8px;font-family:inherit;font-size:15px;transition:border-color .15s;background:#fff;color:var(--t);}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--navy);}
.fg textarea{min-height:120px;resize:vertical;}
.fn-note{font-size:12px;color:var(--lt);margin-top:4px;font-style:italic;}

/* === FOOTER === */
footer{background:var(--navy-x);color:rgba(255,255,255,.7);padding:72px 32px 32px;}
.fi{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px;}
.fb h4{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:14px;font-weight:400;}
.fb p{font-size:14px;line-height:1.6;margin-bottom:20px;}
.fb .fb-motto{font-family:'DM Serif Display',serif;font-style:italic;color:var(--gold);font-size:15px;letter-spacing:1px;margin-top:10px;}
.fc h5{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;margin-bottom:16px;}
.fc ul{list-style:none;padding:0;}
.fc li{margin-bottom:8px;}
.fc a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;transition:color .15s;cursor:pointer;}
.fc a:hover{color:var(--gold);}
.soc{display:flex;gap:12px;margin-top:12px;}
.soc a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;transition:all .2s;}
.soc a:hover{background:var(--gold);color:var(--navy-x);}
.soc svg{width:16px;height:16px;}
.fbot{max-width:1200px;margin:0 auto;padding-top:28px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:16px;}
.fbot a{color:var(--gold);text-decoration:none;}
.fbot a:hover{text-decoration:underline;}

/* === MOBILE === */
@media (max-width:900px){
  .ni{padding:0 20px;height:70px;}
  .logo img,.logo svg{height:46px;}
  .logo svg{width:46px;}
  .mob{inset:70px 0 0;}
  .nl{display:none;}.ham{display:flex;}
  .hero{height:72vh;min-height:500px;}
  .hs-in{padding:0 24px 100px;}
  .ph{padding:80px 24px 64px;}
  .s,.s-dk,.pm{padding:60px 24px;}
  .pm-in{grid-template-columns:1fr;gap:32px;}
  .pm-img{max-width:360px;margin:0 auto;}
  .pl,.iv{grid-template-columns:1fr;}
  .fs{grid-template-columns:1fr;}
  .fs-img{aspect-ratio:4/3;}
  .fs-tx{padding:36px 28px;}
  .fs-tx::before{display:none;}
  .tc{grid-template-columns:1fr;gap:40px;}
  .tc.rev .tc-l{order:0;}
  .gal-grid,.vid-grid,.bd-l{grid-template-columns:1fr;}
  .ss-hd{grid-template-columns:1fr;}
  .ss-hx{padding:28px 28px;}
  .ss-bd-tx{padding:24px 28px 32px;}
  .cx{grid-template-columns:1fr;}
  .fi{grid-template-columns:1fr 1fr;gap:32px;}
  .ev-i{grid-template-columns:80px 1fr;padding:20px;}
  .ev-i .ea{grid-column:1/-1;margin-top:4px;}
  .pr-i{grid-template-columns:1fr;}
  .pr-arr{display:none;}
  .fbot{flex-direction:column;text-align:center;}
}
@media (max-width:480px){
  .hs h1{font-size:34px;}
  .gal-grid,.vid-grid,.bd-l,.fi{grid-template-columns:1fr;}
  .cf{padding:24px;}
  .iv-c{padding:28px;}
}
</style>
</head>
<body>
<div id="app"></div>

<template id="default-logo">
<svg viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
  <path d="M24 2 L44 10 L44 30 Q44 44 24 54 Q4 44 4 30 L4 10 Z" fill="#1c3d6f"/>
  <path d="M24 6 L40 13 L40 30 Q40 41 24 50 Q8 41 8 30 L8 13 Z" fill="#a8c5e8"/>
  <text x="24" y="23" text-anchor="middle" font-family="DM Serif Display, serif" font-size="9" fill="#1c3d6f" font-weight="400">200</text>
  <text x="24" y="33" text-anchor="middle" font-family="DM Serif Display, serif" font-size="6" fill="#1c3d6f" font-weight="400">CLUB</text>
  <rect x="10" y="38" width="28" height="6" fill="#1c3d6f"/>
  <text x="24" y="43" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="3.5" fill="#a8c5e8" font-weight="700" letter-spacing=".3">WE REMEMBER</text>
</svg>
</template>

<script>
(async function(){
  const app=document.getElementById('app');
  let cfg;
  try{
    const res=await fetch('config.json?t='+Date.now());
    if(!res.ok) throw new Error('Failed to load config.json');
    cfg=await res.json();
  }catch(err){
    app.innerHTML='<div style="padding:60px;text-align:center;font-family:sans-serif;"><h2>\u26A0\uFE0F Configuration missing</h2><p>Could not load config.json. Check that the file exists and is valid JSON.</p></div>';
    return;
  }

  function safe(str){if(!str)return'';return String(str).replace(/<script/gi,'&lt;script');}
  function logoHtml(){
    if(cfg.brand.logo && cfg.brand.logo !== 'default'){
      return '<img src="'+safe(cfg.brand.logo)+'" alt="'+safe(cfg.brand.logoAlt||cfg.brand.name)+'" onerror="this.outerHTML=document.getElementById(\'default-logo\').innerHTML">';
    }
    return document.getElementById('default-logo').innerHTML;
  }
  function navHtml(active){
    const links=(cfg.nav.links||[]).map(l=>'<li><a href="'+safe(l.href)+'" class="'+(l.href===active?'active':'')+'">'+safe(l.label)+'</a></li>').join('');
    const cta=cfg.nav.ctaLabel?'<li><a class="ncta" href="'+safe(cfg.nav.ctaHref||'#')+'" target="_blank" rel="noopener">'+safe(cfg.nav.ctaLabel)+'</a></li>':'';
    const mobLinks=(cfg.nav.links||[]).map(l=>'<a href="'+safe(l.href)+'">'+safe(l.label)+'</a>').join('');
    const mobCta=cfg.nav.ctaLabel?'<a class="mc" href="'+safe(cfg.nav.ctaHref||'#')+'" target="_blank" rel="noopener">'+safe(cfg.nav.ctaLabel)+'</a>':'';
    return '<nav><div class="ni">'
      + '<a class="logo" href="index.html" aria-label="'+safe(cfg.brand.name)+' \u2014 Home">'+logoHtml()+'<div class="logo-t">'+safe(cfg.brand.name)+'<small>'+safe(cfg.brand.tagline||'')+'</small></div></a>'
      + '<ul class="nl">'+links+cta+'</ul>'
      + '<button class="ham" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>'
      + '</div><div class="mob">'+mobLinks+mobCta+'</div></nav>';
  }
  function socialIcon(name){
    const icons={
      facebook:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12.07C22 6.5 17.52 2 12 2S2 6.5 2 12.07c0 5 3.66 9.13 8.44 9.88v-6.99H7.9v-2.89h2.54V9.85c0-2.52 1.49-3.91 3.77-3.91 1.09 0 2.24.2 2.24.2v2.47h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.44 2.89h-2.33V22c4.78-.75 8.44-4.87 8.44-9.93z"/></svg>',
      twitter:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      instagram:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.81.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.81-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.81-.25-2.23-.41a3.73 3.73 0 01-1.38-.9 3.73 3.73 0 01-.9-1.38c-.16-.42-.36-1.06-.41-2.23-.06-1.27-.07-1.65-.07-4.85s.01-3.58.07-4.85c.05-1.17.25-1.81.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41 1.27-.06 1.65-.07 4.85-.07M12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63c-.79.3-1.46.72-2.13 1.38A5.9 5.9 0 00.63 4.14C.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.3.79.72 1.46 1.38 2.13a5.9 5.9 0 002.13 1.38c.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56a5.9 5.9 0 002.13-1.38 5.9 5.9 0 001.38-2.13c.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91a5.9 5.9 0 00-1.38-2.13A5.9 5.9 0 0019.86.63C19.1.33 18.22.13 16.95.07 15.67.01 15.26 0 12 0zm0 5.84a6.16 6.16 0 100 12.32 6.16 6.16 0 000-12.32zm0 10.16a4 4 0 110-8 4 4 0 010 8zm6.41-10.41a1.44 1.44 0 11-2.88 0 1.44 1.44 0 012.88 0z"/></svg>',
      youtube:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 00.5 6.2 31 31 0 000 12a31 31 0 00.5 5.8 3 3 0 002.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 002.1-2.1A31 31 0 0024 12a31 31 0 00-.5-5.8zM9.6 15.6V8.4l6.2 3.6z"/></svg>'
    };
    return icons[name]||'';
  }
  function footerHtml(){
    const f=cfg.footer||{};
    const social=cfg.social||{};
    const cols=(f.columns||[]).map(col=>'<div class="fc"><h5>'+safe(col.heading||'')+'</h5><ul>'+(col.links||[]).map(l=>'<li><a href="'+safe(l.href||'#')+'"'+(l.href&&l.href.startsWith('http')?' target="_blank" rel="noopener"':'')+'>'+safe(l.label)+'</a></li>').join('')+'</ul></div>').join('');
    const socialLinks=['facebook','twitter','instagram','youtube'].filter(k=>social[k]).map(k=>'<a href="'+safe(social[k])+'" target="_blank" rel="noopener" aria-label="'+k+'">'+socialIcon(k)+'</a>').join('');
    const motto=cfg.brand.motto?'<div class="fb-motto">'+safe(cfg.brand.motto)+'</div>':'';
    const socBlock=socialLinks?'<div class="soc">'+socialLinks+'</div>':'';
    const desLabel=(f.designerCredit&&f.designerCredit.label)||'Chevelle';
    const desHref=(f.designerCredit&&f.designerCredit.href)||'https://www.bychevelle.com';
    return '<footer><div class="fi">'
      + '<div class="fb"><h4>'+safe(f.brandName||cfg.brand.name)+'</h4><p>'+safe(f.blurb||'')+'</p>'+motto+socBlock+'</div>'
      + cols
      + '</div><div class="fbot"><div>'+safe(f.copyright||'')+'</div><div>Designed by <a href="'+safe(desHref)+'" target="_blank" rel="noopener">'+safe(desLabel)+'</a></div></div></footer>';
  }
  function bindMobileMenu(){
    const ham=document.querySelector('.ham');
    const mob=document.querySelector('.mob');
    if(ham&&mob){
      ham.addEventListener('click',()=>{
        const open=mob.classList.toggle('open');
        ham.setAttribute('aria-expanded',open?'true':'false');
      });
      mob.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{mob.classList.remove('open');ham.setAttribute('aria-expanded','false');}));
    }
  }

  // === PAGE-SPECIFIC RENDER ===

  const md=cfg.media||{};
  const hero=md.hero||{};
  const ev=md.events||{};
  const pr=md.press||{};
  const gal=md.galleries||{};
  const vid=md.videos||{};

  const eventsHtml=(ev.items||[]).map(e=>
    '<div class="ev-i">'
    + '<div class="ed"><div class="mo">'+safe(e.month||'')+'</div><div class="dy">'+safe(e.day||'')+'</div><div class="yr">'+safe(e.year||'')+'</div></div>'
    + '<div class="eb"><h3>'+safe(e.title)+'</h3><p>'+safe(e.description)+'</p></div>'
    + '<div class="ea">'+(e.ctaLabel?'<a class="btn bb" href="'+safe(e.ctaHref||'#')+'" target="_blank" rel="noopener">'+safe(e.ctaLabel)+'</a>':'')+'</div>'
    + '</div>'
  ).join('');

  const pressHtml=(pr.categories||[]).map(cat=>{
    const items=(cat.items||[]).map(i=>{
      const isExt = i.url && i.url!=='#';
      const meta = safe(i.outlet||'')+(i.date?' \u2022 '+safe(i.date):'');
      return '<a class="pr-i" href="'+safe(i.url||'#')+'"'+(isExt?' target="_blank" rel="noopener"':'')+'>'
        + '<div class="pr-tx"><div class="pt">'+safe(i.title)+'</div><div class="pm"><span class="po">'+safe(i.outlet||'')+'</span>'+(i.date?' \u2022 '+safe(i.date):'')+'</div></div>'
        + '<div class="pr-arr">\u2192</div></a>';
    }).join('');
    return '<div class="pr-cat"><h3>'+safe(cat.heading||'')+'</h3><div class="pr-list">'+items+'</div></div>';
  }).join('');

  const galHtml=(gal.collections||[]).map(g=>{
    const img = g.coverImage ? '<img src="'+safe(g.coverImage)+'" alt="'+safe(g.title||'')+'" onerror="this.parentElement.innerHTML=\'<div class=&quot;gal-c-ph&quot;><div class=&quot;ic&quot;>\u{1F4F7}</div><div class=&quot;fn&quot;>'+safe(g.coverImage)+'</div></div>\'">' : '<div class="gal-c-ph"><div class="ic">\u{1F4F7}</div><div class="fn">'+safe(g.year||'gal')+'.jpg</div></div>';
    return '<a class="gal-c" href="'+safe(g.url||'#')+'" target="_blank" rel="noopener">'
      + '<div class="gal-c-img">'+img+'</div>'
      + '<div class="gal-c-hd"><div class="gal-c-t">'+safe(g.title||'')+'</div><div class="gal-c-yr">'+safe(g.year||'')+'</div></div>'
      + '</a>';
  }).join('');

  const vidHtml=(vid.items||[]).map(v=>{
    const thumb='https://i.ytimg.com/vi/'+safe(v.videoId||'')+'/hqdefault.jpg';
    return '<a class="vid-c" href="'+safe(v.url||'#')+'" target="_blank" rel="noopener">'
      + '<div class="vid-c-img"><img src="'+thumb+'" alt="'+safe(v.title||'Video')+'" onerror="this.style.display=\'none\'"><div class="vid-play"></div></div>'
      + '<div class="vid-c-hd"><div class="vid-c-t">'+safe(v.title||'Watch')+'</div></div>'
      + '</a>';
  }).join('');

  app.innerHTML=
    navHtml('media.html')
    + '<section class="ph"><div class="ph-in">'
    + (hero.eyebrow?'<span class="ph-ey">'+safe(hero.eyebrow)+'</span>':'')
    + '<h1>'+safe(hero.title||'')+'</h1>'
    + '<p>'+safe(hero.subheadline||'')+'</p>'
    + '</div></section>'
    + '<section class="s" id="events">'
    + '<span class="ey">'+safe(ev.eyebrow||'Events')+'</span>'
    + '<h2 class="d">'+safe(ev.title||'')+'</h2>'
    + '<div class="rule"></div>'
    + '<p style="color:var(--m);max-width:700px;">'+safe(ev.description||'')+'</p>'
    + '<div class="ev">'+eventsHtml+'</div>'
    + '</section>'
    + '<section class="s s-bl" id="press">'
    + '<span class="ey">'+safe(pr.eyebrow||'Press')+'</span>'
    + '<h2 class="d">'+safe(pr.title||'')+'</h2>'
    + '<div class="rule"></div>'
    + (pr.description?'<p style="color:var(--m);max-width:700px;">'+safe(pr.description)+'</p>':'')
    + pressHtml
    + '</section>'
    + '<section class="s" id="galleries">'
    + '<span class="ey">'+safe(gal.eyebrow||'Galleries')+'</span>'
    + '<h2 class="d">'+safe(gal.title||'')+'</h2>'
    + '<div class="rule"></div>'
    + (gal.description?'<p style="color:var(--m);max-width:700px;">'+safe(gal.description)+(gal.sourceUrl?' <a href="'+safe(gal.sourceUrl)+'" target="_blank" rel="noopener" style="color:var(--navy);border-bottom:1px solid var(--blue-l);">'+safe(gal.sourceLabel||'View on SmugMug')+'</a>.':'')+'</p>':'')
    + '<div class="gal-grid">'+galHtml+'</div>'
    + '</section>'
    + '<section class="s s-bl" id="videos">'
    + '<span class="ey">'+safe(vid.eyebrow||'Videos')+'</span>'
    + '<h2 class="d">'+safe(vid.title||'')+'</h2>'
    + '<div class="rule"></div>'
    + (vid.description?'<p style="color:var(--m);max-width:700px;">'+safe(vid.description)+'</p>':'')
    + '<div class="vid-grid">'+vidHtml+'</div>'
    + '</section>'
    + footerHtml();


  bindMobileMenu();
})();
</script>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
